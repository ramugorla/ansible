- name: install and run nginx 
  hosts: web
  become: yes 
  tasks:
    - name: install nginx if RHEL
      ansible.builtin.dnf:
        name: nginx 
        state: installed
      when: ansible_os_family == "RedHat"
    - name: start nginx 
      ansible.builtin.service:
        name: nginx 
        state: started 
        enabled: yes 

    - name: install nginx if ubuntu 
      ansible.builtin.apt:
        name: nginx 
        state: installed
      when: ansible_os_familiy == "Debian"
