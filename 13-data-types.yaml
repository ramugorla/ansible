- name: printing different data types 
  hosts: web 
  vars:
    COURSE: "Devops With Aws"
    DURATION: 120HRS 
    topics:
      - AWS
      - Cloud
      - Ansible 
      - shell 
    live: true 
    tools:
      ci/cd: Jenkins
      cloud: Aws
      git: version 
  tasks:
    - name: print course information
      msg: "Course name {{ COURSE }} Duration is {{ DURATION}} topics are {{ topics }} is it Live? {{ live }} and tools are {{ tools }}" 