- name: prompt
  hosts: local
  connection: local
  vars_prompt:
    - name: COURSE 
      prompt: Please enter course name
    - name: TRAINER
      prompt: Please enter Trainer name
    - name: DURATION
      prompt: please enter hours 
  tasks:
    - name: providing prompt
      ansible.builtin.debug:
        msg: "Course is {{ COURSE }} duration is {{ DURATION }} and Trainer is {{ TRAINER }}"